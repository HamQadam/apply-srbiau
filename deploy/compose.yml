services:
  api:
    build:
      context: ../backend
    container_name: apply-api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apply_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apply_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apply_db}
      POSTGRES_HOST: database
      DEBUG: ${DEBUG:-true}
      DEBUG_OTP: ${DEBUG_OTP:-true}
      CORS_ORIGINS: '["https://apply.ham-ghadam.ir","https://apply-api.ham-ghadam.ir","http://localhost","http://127.0.0.1","http://localhost:5173","http://127.0.0.1:5173"]'
    env_file:
      - path: ../.env
        required: false
    volumes:
      - uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8888"   # internal only
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 30

  frontend:
    build:
      context: ../frontend
    container_name: apply-frontend
    environment:
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    expose:
      - "80"     # internal only


  # ─────────────────────────────────────────────────────────────
  # DAAD Crawler (Germany)
  # ─────────────────────────────────────────────────────────────
  daad-crawler:
    build: ../crawlers
    command: ["daad"]
    profiles: ["crawlers", "all-crawlers"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apply_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apply_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apply_db}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      BATCH_SIZE: 50
      DAAD_RPS: 2.0
      DB_WAIT_TIMEOUT_S: 180
    volumes:
      - crawler-state:/state
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────────────────────────
  # StudyInNL Crawler (Netherlands)
  # ─────────────────────────────────────────────────────────────
  studyinnl-crawler:
    build: ../crawlers
    command: ["studyinnl"]
    profiles: ["crawlers", "all-crawlers"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apply_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apply_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apply_db}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      BATCH_SIZE: 50
      STUDYINNL_RPS: 2.0
      DB_WAIT_TIMEOUT_S: 180
    volumes:
      - crawler-state:/state
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: "no"

  database:
    image: postgres:16
    container_name: apply-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apply_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apply_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apply_db}
      PGDATA: /data/postgres
    ports:
      - 127.0.0.1:5432:5432
    env_file:
      - path: ../.env
        required: false
    volumes:
      - db:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: apply-edge
    depends_on:
      - api
      - frontend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # later when you add TLS:
      # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped


  # ─────────────────────────────────────────────────────────────
  # Post-process Stage 2: Lexical parse job
  # Reads raw_crawl_items (parse_status=pending), runs rule-based
  # transformers, writes to courses/universities, flags needs_llm.
  # ─────────────────────────────────────────────────────────────
  parse-raw:
    build: ../postprocess
    command: ["run", "parse-raw", "--batch-size", "100", "--max-rows", "50000"]
    profiles: ["postprocess", "all-postprocess"]
    env_file:
      - path: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apply_user}:${POSTGRES_PASSWORD:-apply_secret}@database:5432/${POSTGRES_DB:-apply_db}
      LOCK_ROWS: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────────────────────────
  # Post-process Stage 3: LLM enrichment job
  # Reads raw_crawl_items (parse_status=needs_llm), calls LiteLLM
  # to fill missing fields, patches courses, marks done.
  # ─────────────────────────────────────────────────────────────
  llm-enrich:
    build: ../postprocess
    command: ["run", "llm-enrich", "--batch-size", "50", "--max-rows", "10000"]
    profiles: ["postprocess", "all-postprocess"]
    env_file:
      - path: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apply_user}:${POSTGRES_PASSWORD:-apply_secret}@database:5432/${POSTGRES_DB:-apply_db}
      LOCK_ROWS: "true"
      # LiteLLM provider config — set these in your .env file.
      # Switch provider by changing LITELLM_MODEL; no code changes needed.
      LITELLM_ENABLED: ${LITELLM_ENABLED:-true}
      LITELLM_MODEL: ${LITELLM_MODEL:-openrouter/meta-llama/llama-3.1-8b-instruct:free}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      LITELLM_MAX_TOKENS: ${LITELLM_MAX_TOKENS:-256}
      LITELLM_TEMPERATURE: ${LITELLM_TEMPERATURE:-0.0}
      LITELLM_TIMEOUT: ${LITELLM_TIMEOUT:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────────────────────────
  # Post-process: Deadline Refiner (rules-first, local LLM fallback)
  # Runs after parse-raw; fills deadline_fall/spring from deadline_notes.
  # ─────────────────────────────────────────────────────────────
  deadline-refiner:
    env_file:
      - path: ../.env
    build: ../postprocess
    command: ["run", "deadlines", "--batch-size", "200", "--max-rows", "50000"]
    profiles: ["postprocess", "all-postprocess"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apply_user}:${POSTGRES_PASSWORD:-apply_secret}@database:5432/${POSTGRES_DB:-apply_db}
      TABLE_NAME: public.courses
      ID_COLUMN: id
      NOTES_COLUMN: deadline_notes
      FALL_COLUMN: deadline_fall
      SPRING_COLUMN: deadline_spring
      LOCK_ROWS: "true"
      LITELLM_ENABLED: ${LITELLM_ENABLED:-true}
      LITELLM_MODEL: ${LITELLM_MODEL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      LITELLM_MAX_TOKENS: ${LITELLM_MAX_TOKENS:-256}
      LITELLM_TEMPERATURE: ${LITELLM_TEMPERATURE:-0.0}
      LITELLM_TIMEOUT: ${LITELLM_TIMEOUT:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: "no"


volumes:
  db:
  uploads:
  crawler-state:
